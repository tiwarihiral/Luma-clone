<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream MACHINE - Dashboard</title>
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Left Navigation Bar -->
        <nav class="sidebar">
            <div class="logo-section">
                <div class="logo-icon"></div>
                <div class="logo-text">
                    <div class="dream">Dream</div>
                    <div class="machine">MACHINE</div>
                </div>
            </div>
            
            <div class="nav-items">
                <div class="nav-item active">
                    <div class="nav-icon boards-icon">
                        <img src="board.png" alt="Boards" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">BOARDS</span>
                </div>
                
                <div class="nav-item" onclick="window.location.href='ideas.html'">
                    <div class="nav-icon ideas-icon">
                        <img src="idea.jpg" alt="Ideas" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">IDEAS</span>
                </div>
                
                <div class="nav-item" onclick="window.location.href='editor.html'">
                    <div class="nav-icon editor-icon">
                        <img src="editior.png" alt="Editor" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">EDITOR</span>
                </div>
            </div>
            
            <div class="nav-footer">
                <div class="nav-icon help-icon"></div>
                <div class="profile-avatar"></div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="boards-grid">
                <!-- Futuristic Interface Card -->
                <div class="board-card futuristic">
                    <div class="card-content">
                        <h3 class="card-title">
                            <span class="title-main">FUTURISTIC</span>
                            <span class="title-accent">INTERFACE</span>
                        </h3>
                        <p class="ideas-count">16 Ideas</p>
                    </div>
                    <div class="card-thumbnail futuristic-thumb">
                        <img src="future image.jpg" alt="Futuristic Interface" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px;">
                    </div>
                </div>

                <!-- Cosmic Bubble Card -->
                <div class="board-card cosmic">
                    <div class="card-content">
                        <h3 class="card-title">
                            <span class="title-main">COSMIC</span>
                            <span class="title-accent">BUBBLE</span>
                        </h3>
                        <p class="ideas-count">18 Ideas</p>
                    </div>
                    <div class="card-thumbnail cosmic-thumb">
                        <img src="buuble.jpg" alt="Cosmic Bubble" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px;">
                    </div>
                </div>

                <!-- Timeless Elegance Card -->
                <div class="board-card timeless">
                    <div class="card-content">
                        <h3 class="card-title">
                            <span class="title-main">TIMELESS</span>
                            <span class="title-accent">ELEGANCE</span>
                        </h3>
                        <p class="ideas-count">58 Ideas</p>
                    </div>
                    <div class="card-thumbnail timeless-thumb">
                        <img src="timeless.webp" alt="Timeless Elegance" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px;">
                    </div>
                </div>

                <!-- Lily Vibe Lamp Card -->
                <div class="board-card lily">
                    <div class="card-content">
                        <h3 class="card-title">
                            <span class="title-main">LILY VIBE</span>
                            <span class="title-accent">LAMP</span>
                        </h3>
                        <p class="ideas-count">24 Ideas</p>
                    </div>
                    <div class="card-thumbnail lily-thumb">
                        <img src="lamp.webp" alt="Lily Vibe Lamp" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px;">
                    </div>
                </div>
            </div>

            <!-- Add Button -->
            <div class="add-button-container">
                <button class="add-button">
                    <span class="plus-icon">+</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        // Add click handlers for navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                
                // Handle navigation
                const label = this.querySelector('.nav-label').textContent;
                if (label === 'BOARDS') {
                    // Already on boards page
                } else if (label === 'IDEAS') {
                    window.location.href = 'ideas.html';
                } else if (label === 'EDITOR') {
                    window.location.href = 'editor.html';
                }
            });
        });

        // Add click handlers for board cards
        document.querySelectorAll('.board-card').forEach(card => {
            card.addEventListener('click', function() {
                // Navigate to ideas page when clicking on a board
                window.location.href = 'ideas.html';
            });
        });

        // Add click handler for add button
        document.querySelector('.add-button').addEventListener('click', function() {
            // Navigate to editor page to create new content
            window.location.href = 'editor.html';
        });

        // Add hover effects for board cards
        document.querySelectorAll('.board-card').forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-8px)';
                this.style.boxShadow = '0 20px 40px rgba(0, 0, 0, 0.4)';
            });
            
            card.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
                this.style.boxShadow = 'none';
            });
        });
    </script>
</body>
</html>
