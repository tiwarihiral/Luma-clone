<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream MACHINE - Editor</title>
    <link rel="stylesheet" href="editor-styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Left Navigation Bar -->
        <nav class="sidebar">
            <div class="logo-section">
                <div class="logo-icon"></div>
                <div class="logo-text">
                    <div class="dream">Dream</div>
                    <div class="machine">MACHINE</div>
                </div>
            </div>
            
            <div class="nav-items">
                <div class="nav-item" onclick="window.location.href='dashboard.html'">
                    <div class="nav-icon boards-icon">
                        <img src="board.png" alt="Boards" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">BOARDS</span>
                </div>
                
                <div class="nav-item" onclick="window.location.href='ideas.html'">
                    <div class="nav-icon ideas-icon">
                        <img src="idea.jpg" alt="Ideas" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">IDEAS</span>
                </div>
                
                <div class="nav-item active">
                    <div class="nav-icon editor-icon">
                        <img src="editior.png" alt="Editor" style="width: 24px; height: 24px; object-fit: contain;">
                    </div>
                    <span class="nav-label">EDITOR</span>
                </div>
            </div>
            
            <div class="nav-footer">
                <div class="nav-icon help-icon"></div>
                <div class="profile-avatar"></div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Navigation Bar -->
            <div class="top-bar">
                <div class="left-section">
                    <h1 class="page-title">EDITOR</h1>
                    <div class="editor-tabs">
                        <button class="editor-tab active" data-mode="create">Create</button>
                        <button class="editor-tab" data-mode="edit">Edit</button>
                        <button class="editor-tab" data-mode="enhance">Enhance</button>
                    </div>
                </div>
                
                <div class="right-section">
                    <button class="action-btn secondary">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                        Save
                    </button>
                    <button class="action-btn primary">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                        Generate
                    </button>
                </div>
            </div>

            <!-- Editor Workspace -->
            <div class="editor-workspace">
                <div class="workspace-left">
                    <!-- Prompt Input Section -->
                    <div class="prompt-section">
                        <h3>Describe your vision</h3>
                        <div class="prompt-input-container">
                            <textarea class="prompt-textarea" placeholder="Describe what you want to create in detail..."></textarea>
                            <div class="prompt-actions">
                                <button class="prompt-action-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                                    </svg>
                                    Upload Image
                                </button>
                                <button class="prompt-action-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                    </svg>
                                    Style Reference
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Settings Panel -->
                    <div class="settings-panel">
                        <h3>Generation Settings</h3>
                        <div class="setting-group">
                            <label>Model</label>
                            <select class="setting-select">
                                <option>PHOTON - Image Generation</option>
                                <option>RAY2 - Video Generation</option>
                                <option>DREAM - Advanced AI</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>Aspect Ratio</label>
                            <div class="aspect-ratio-grid">
                                <button class="aspect-btn active" data-ratio="16:9">16:9</button>
                                <button class="aspect-btn" data-ratio="1:1">1:1</button>
                                <button class="aspect-btn" data-ratio="4:3">4:3</button>
                                <button class="aspect-btn" data-ratio="9:16">9:16</button>
                            </div>
                        </div>
                        <div class="setting-group">
                            <label>Style</label>
                            <select class="setting-select">
                                <option>Realistic</option>
                                <option>Artistic</option>
                                <option>Abstract</option>
                                <option>Minimalist</option>
                                <option>Cyberpunk</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label>Quality</label>
                            <div class="quality-slider">
                                <input type="range" min="1" max="10" value="8" class="slider">
                                <span class="quality-value">High</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="workspace-right">
                    <!-- Preview Area -->
                    <div class="preview-area">
                        <div class="preview-header">
                            <h3>Preview</h3>
                            <div class="preview-actions">
                                <button class="preview-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                    </svg>
                                </button>
                                <button class="preview-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                                    </svg>
                                </button>
                                <button class="preview-btn">
                                    <svg viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="preview-content">
                            <div class="preview-placeholder">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                                </svg>
                                <p>Your generated content will appear here</p>
                            </div>
                        </div>
                    </div>

                    <!-- History Panel -->
                    <div class="history-panel">
                        <h3>Recent Generations</h3>
                        <div class="history-list">
                            <div class="history-item">
                                <div class="history-thumbnail"></div>
                                <div class="history-info">
                                    <p class="history-prompt">Futuristic cityscape at sunset</p>
                                    <span class="history-time">2 minutes ago</span>
                                </div>
                            </div>
                            <div class="history-item">
                                <div class="history-thumbnail"></div>
                                <div class="history-info">
                                    <p class="history-prompt">Abstract geometric patterns</p>
                                    <span class="history-time">5 minutes ago</span>
                                </div>
                            </div>
                            <div class="history-item">
                                <div class="history-thumbnail"></div>
                                <div class="history-info">
                                    <p class="history-prompt">Minimalist logo design</p>
                                    <span class="history-time">10 minutes ago</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Prompt Input -->
            <div class="bottom-prompt-container">
                <div class="input-left">
                    <button class="input-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                        </svg>
                    </button>
                    <button class="input-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </button>
                </div>
                
                <input type="text" class="prompt-input" placeholder="What do you want to create..." />
                
                <div class="input-right">
                    <select class="generation-settings">
                        <option>IMAGE - PHOTON - 16:9</option>
                        <option>VIDEO - RAY2 - 16:9</option>
                        <option>ENHANCE - DREAM - 16:9</option>
                    </select>
                    <button class="submit-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Add click handlers for navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                
                // Handle navigation
                const label = this.querySelector('.nav-label').textContent;
                if (label === 'BOARDS') {
                    window.location.href = 'dashboard.html';
                } else if (label === 'IDEAS') {
                    window.location.href = 'ideas.html';
                } else if (label === 'EDITOR') {
                    // Already on editor page
                }
            });
        });

        // Add click handlers for editor tabs
        document.querySelectorAll('.editor-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                const mode = this.dataset.mode;
                updateEditorMode(mode);
            });
        });

        // Add click handlers for aspect ratio buttons
        document.querySelectorAll('.aspect-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Update editor mode
        function updateEditorMode(mode) {
            const promptSection = document.querySelector('.prompt-section h3');
            const promptTextarea = document.querySelector('.prompt-textarea');
            
            switch(mode) {
                case 'create':
                    promptSection.textContent = 'Describe your vision';
                    promptTextarea.placeholder = 'Describe what you want to create in detail...';
                    break;
                case 'edit':
                    promptSection.textContent = 'Describe the changes';
                    promptTextarea.placeholder = 'Describe what changes you want to make...';
                    break;
                case 'enhance':
                    promptSection.textContent = 'Enhance your content';
                    promptTextarea.placeholder = 'Describe how you want to enhance your content...';
                    break;
            }
        }

        // Quality slider functionality
        const qualitySlider = document.querySelector('.quality-slider input');
        const qualityValue = document.querySelector('.quality-value');
        
        qualitySlider.addEventListener('input', function() {
            const value = parseInt(this.value);
            const qualityLabels = ['Low', 'Medium', 'High', 'Ultra'];
            const labelIndex = Math.floor((value - 1) / 3);
            qualityValue.textContent = qualityLabels[Math.min(labelIndex, 3)];
        });

        // Generate button functionality
        document.querySelector('.submit-btn').addEventListener('click', function() {
            const prompt = document.querySelector('.prompt-input').value;
            if (!prompt.trim()) {
                alert('Please enter a prompt first!');
                return;
            }
            
            // Simulate generation process
            const preview = document.querySelector('.preview-placeholder');
            preview.innerHTML = `
                <div class="generating-animation">
                    <div class="spinner"></div>
                    <p>Generating your content...</p>
                </div>
            `;
            
            setTimeout(() => {
                preview.innerHTML = `
                    <div class="generated-content">
                        <div class="content-preview"></div>
                        <p>Content generated successfully!</p>
                    </div>
                `;
            }, 3000);
        });
    </script>
</body>
</html>
